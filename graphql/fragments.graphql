  }
}

fragment SetInfo on MGSet {
  __typename
  ...SetBasicInfo
  children {
    __typename
    ...SetBasicInfo
    children {
      __typename
      ...SetBasicInfo
        children {
          __typename
          ...SetBasicInfo
        }
    }
  }
}

